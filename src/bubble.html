<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 10px 16px 16px;
      }

      /* -- White text card -- */
      .card {
        width: 100%;
        background: #fff;
        border-radius: 18px;
        padding: 16px 20px;
        box-shadow: 0 2px 24px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
        min-height: 48px;
        display: flex;
        align-items: center;
      }

      .card-text {
        font-size: 14.5px;
        line-height: 1.65;
        color: #1d1d1f;
        white-space: pre-wrap;
        word-break: break-word;
        flex: 1;
      }

      /* Blinking cursor for interim */
      .card-text.interim::after {
        content: '▍';
        animation: blink 0.8s step-end infinite;
        color: #999;
        font-weight: 300;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Fade-in for newly appearing text spans */
      .fade-in {
        animation: textFadeIn 0.4s ease-out both;
      }

      @keyframes textFadeIn {
        from { opacity: 0; transform: translateY(4px); filter: blur(2px); }
        to   { opacity: 1; transform: translateY(0);  filter: blur(0); }
      }

      /* Crossfade for final result replacing interim */
      .crossfade {
        animation: crossfade 0.35s ease-out both;
      }

      @keyframes crossfade {
        from { opacity: 0.4; }
        to   { opacity: 1; }
      }

      /* Typing dots */
      .typing-dots {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 0;
      }

      .typing-dots i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #c8c5c0;
        animation: typingFade 1.2s ease-in-out infinite;
      }

      .typing-dots i:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots i:nth-child(3) { animation-delay: 0.4s; }

      @keyframes typingFade {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* -- Black pill -- */
      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 48px;
        min-width: 130px;
        padding: 0 24px;
        border-radius: 28px;
        background: #1d1d1f;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        transition: opacity 0.3s ease;
      }

      .waveform {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 24px;
      }

      .waveform i {
        display: block;
        width: 3px;
        border-radius: 2px;
        background: #fff;
      }

      .waveform i:nth-child(1)  { height: 5px; }
      .waveform i:nth-child(2)  { height: 8px; }
      .waveform i:nth-child(3)  { height: 14px; }
      .waveform i:nth-child(4)  { height: 20px; }
      .waveform i:nth-child(5)  { height: 16px; }
      .waveform i:nth-child(6)  { height: 20px; }
      .waveform i:nth-child(7)  { height: 14px; }
      .waveform i:nth-child(8)  { height: 8px; }
      .waveform i:nth-child(9)  { height: 5px; }

      .pill.recording .waveform i {
        animation: wave 0.8s ease-in-out infinite alternate;
      }
      .pill.recording .waveform i:nth-child(1) { animation-delay: 0s; }
      .pill.recording .waveform i:nth-child(2) { animation-delay: 0.07s; }
      .pill.recording .waveform i:nth-child(3) { animation-delay: 0.14s; }
      .pill.recording .waveform i:nth-child(4) { animation-delay: 0.21s; }
      .pill.recording .waveform i:nth-child(5) { animation-delay: 0.28s; }
      .pill.recording .waveform i:nth-child(6) { animation-delay: 0.35s; }
      .pill.recording .waveform i:nth-child(7) { animation-delay: 0.42s; }
      .pill.recording .waveform i:nth-child(8) { animation-delay: 0.49s; }
      .pill.recording .waveform i:nth-child(9) { animation-delay: 0.56s; }

      @keyframes wave {
        0%   { height: 4px; }
        100% { height: 22px; }
      }

      .pill.recognizing {
        animation: pillPulse 0.8s ease-in-out infinite;
      }

      @keyframes pillPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      .hidden { display: none !important; }

      @media (prefers-color-scheme: dark) {
        .card {
          background: #2c2c2e;
          box-shadow: 0 2px 24px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.06);
        }
        .card-text { color: #f5f5f7; }
        .typing-dots i { background: #636366; }
        .pill { background: #f5f5f7; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .waveform i { background: #1d1d1f; }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card" id="card">
        <div class="typing-dots" id="dots"><i></i><i></i><i></i></div>
        <div class="card-text hidden" id="text"></div>
      </div>
      <div class="pill recording" id="pill">
        <span class="waveform">
          <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
        </span>
      </div>
    </div>

    <script>
      var _prevText = '';

      // Find longest common prefix between two strings
      function _commonPrefix(a, b) {
        var i = 0;
        while (i < a.length && i < b.length && a[i] === b[i]) i++;
        return i;
      }

      // Render text with fade-in on the new portion
      function _renderWithFade(el, text, prevText) {
        var prefixLen = _commonPrefix(prevText, text);
        var stableText = text.slice(0, prefixLen);
        var newText = text.slice(prefixLen);

        if (newText.length === 0 && stableText === prevText) {
          return; // no change
        }

        // Build innerHTML: stable part as text node + new part in fade-in span
        el.innerHTML = '';
        if (stableText) {
          el.appendChild(document.createTextNode(stableText));
        }
        if (newText) {
          var span = document.createElement('span');
          span.className = 'fade-in';
          span.textContent = newText;
          el.appendChild(span);
        }
      }

      // -- Public API called from Rust --

      function showRecording() {
        _prevText = '';
        document.getElementById('dots').className = 'typing-dots';
        var t = document.getElementById('text');
        t.className = 'card-text hidden';
        t.innerHTML = '';
        document.getElementById('pill').className = 'pill recording';
        document.getElementById('card').className = 'card';
      }

      function showRecognizing() {
        var t = document.getElementById('text');
        t.classList.remove('interim');
        document.getElementById('pill').className = 'pill recognizing';
      }

      function showInterim(text) {
        document.getElementById('dots').className = 'typing-dots hidden';
        var t = document.getElementById('text');
        t.className = 'card-text interim';
        _renderWithFade(t, text, _prevText);
        _prevText = text;
      }

      function showResult(text) {
        document.getElementById('dots').className = 'typing-dots hidden';
        var t = document.getElementById('text');

        if (_prevText) {
          // Had interim — crossfade transition from interim to final
          t.className = 'card-text crossfade';
          _renderWithFade(t, text, _prevText);
        } else {
          // No interim — full fade-in
          t.className = 'card-text fade-in';
          t.textContent = text;
        }

        _prevText = text;
        document.getElementById('pill').className = 'pill hidden';
      }

      function showError(text) {
        _prevText = '';
        document.getElementById('dots').className = 'typing-dots hidden';
        var t = document.getElementById('text');
        t.className = 'card-text fade-in';
        t.textContent = text;
        document.getElementById('pill').className = 'pill hidden';
      }
    </script>
  </body>
</html>
