<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        height: 100vh;
        padding: 10px 16px 16px;
      }

      /* -- White text card -- */
      .card {
        width: 100%;
        background: #fff;
        border-radius: 18px;
        padding: 16px 20px;
        box-shadow: 0 2px 24px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
        min-height: 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
      }

      .card-content {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        min-height: 0;
      }

      .card.text-mode {
        justify-content: flex-start;
      }

      .card.text-mode .card-content {
        display: block;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* Canvas fills the card content area */
      .card-content canvas {
        display: block;
        width: 100%;
        max-width: 100%;
        flex: 0 0 auto;
      }

      /* Typing dots */
      .typing-dots {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 0;
      }

      .typing-dots i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #c8c5c0;
        animation: typingFade 1.2s ease-in-out infinite;
      }

      .typing-dots i:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots i:nth-child(3) { animation-delay: 0.4s; }

      @keyframes typingFade {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* -- Black pill -- */
      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 48px;
        min-width: 130px;
        padding: 0 24px;
        border-radius: 28px;
        background: #1d1d1f;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        transition: opacity 0.3s ease;
        flex-shrink: 0;
      }

      .waveform {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 24px;
      }

      .waveform i {
        display: block;
        width: 3px;
        border-radius: 2px;
        background: #fff;
      }

      .waveform i:nth-child(1)  { height: 5px; }
      .waveform i:nth-child(2)  { height: 8px; }
      .waveform i:nth-child(3)  { height: 14px; }
      .waveform i:nth-child(4)  { height: 20px; }
      .waveform i:nth-child(5)  { height: 16px; }
      .waveform i:nth-child(6)  { height: 20px; }
      .waveform i:nth-child(7)  { height: 14px; }
      .waveform i:nth-child(8)  { height: 8px; }
      .waveform i:nth-child(9)  { height: 5px; }

      .pill.recording .waveform i {
        animation: wave 0.8s ease-in-out infinite alternate;
      }
      .pill.recording .waveform i:nth-child(1) { animation-delay: 0s; }
      .pill.recording .waveform i:nth-child(2) { animation-delay: 0.07s; }
      .pill.recording .waveform i:nth-child(3) { animation-delay: 0.14s; }
      .pill.recording .waveform i:nth-child(4) { animation-delay: 0.21s; }
      .pill.recording .waveform i:nth-child(5) { animation-delay: 0.28s; }
      .pill.recording .waveform i:nth-child(6) { animation-delay: 0.35s; }
      .pill.recording .waveform i:nth-child(7) { animation-delay: 0.42s; }
      .pill.recording .waveform i:nth-child(8) { animation-delay: 0.49s; }
      .pill.recording .waveform i:nth-child(9) { animation-delay: 0.56s; }

      @keyframes wave {
        0%   { height: 4px; }
        100% { height: 22px; }
      }

      .pill.recognizing {
        animation: pillPulse 0.8s ease-in-out infinite;
      }

      @keyframes pillPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      /* Copy button */
      .copy-btn {
        position: absolute;
        top: 8px;
        right: 10px;
        width: 28px;
        height: 28px;
        border: none;
        background: rgba(0,0,0,0.04);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .copy-btn.visible {
        opacity: 0.6;
        pointer-events: auto;
      }
      .copy-btn:hover { opacity: 1; background: rgba(0,0,0,0.08); }
      .copy-btn svg { width: 15px; height: 15px; stroke: #666; fill: none; stroke-width: 1.6; }

      /* Thin scrollbar for card overflow */
      .card-content::-webkit-scrollbar { width: 4px; }
      .card-content::-webkit-scrollbar-track { background: transparent; }
      .card-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

      .hidden { display: none !important; }

      @media (prefers-color-scheme: dark) {
        .card {
          background: #2c2c2e;
          box-shadow: 0 2px 24px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.06);
        }
        .typing-dots i { background: #636366; }
        .pill { background: #f5f5f7; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .waveform i { background: #1d1d1f; }
        .copy-btn { background: rgba(255,255,255,0.06); }
        .copy-btn:hover { background: rgba(255,255,255,0.12); }
        .copy-btn svg { stroke: #aaa; }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card" id="card">
        <div class="card-content" id="card-content">
          <div class="typing-dots" id="dots"><i></i><i></i><i></i></div>
          <canvas id="text-canvas" class="hidden"></canvas>
        </div>
        <button class="copy-btn" id="copy-btn" title="Copy as image">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="pill recording" id="pill">
        <span class="waveform">
          <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
        </span>
      </div>
    </div>

    <script type="module" src="/src/bubble.ts"></script>
  </body>
</html>
