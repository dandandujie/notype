# NoType Configuration
# Copy this file to ~/.config/notype/config.toml (macOS/Linux)
# or %APPDATA%/notype/config.toml (Windows)
#
# Environment variables override config file values:
#   NOTYPE_API_KEY    - API key
#   NOTYPE_PROVIDER   - "gemini" or "qwen"
#   NOTYPE_MODEL      - Model name

[general]
hotkey = "Ctrl+."
# input_mode: "Keyboard" (simulate typing) or "Clipboard" (paste)
input_mode = "Keyboard"

[model]
# provider: "Gemini" or "Qwen"
provider = "Gemini"
api_key = ""  # Get from https://ai.google.dev (Gemini) or https://dashscope.aliyuncs.com (Qwen)
# Gemini models: gemini-3-flash, gemini-3.1-flash-lite
# Qwen models: qwen3.5-omni-flash, qwen3.5-omni-plus, qwen3.5-omni-light
model_name = "gemini-3-flash"
