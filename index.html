<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoType</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app">

      <!-- Top bar -->
      <header class="topbar">
        <span class="brand">NoType</span>
        <div class="topbar-actions">
          <button type="button" class="topbar-btn" id="toggle-prompts" title="Prompts">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </button>
          <button type="button" class="topbar-btn" id="toggle-settings" title="Settings">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- Main voice area -->
      <section class="voice-area">
        <p class="status-label" id="status-text">Tap to start</p>

        <button class="rec-pill" id="voice-ring" type="button">
          <span class="waveform" id="waveform">
            <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
          </span>
        </button>

        <p class="shortcut-hint">or hold <kbd id="hotkey-hint">Ctrl + .</kbd></p>
      </section>

      <!-- Prompts panel -->
      <section class="panel prompts-panel" id="prompts-panel">
        <div class="panel-tabs">
          <button class="tab active" data-tab="agent">角色指令</button>
          <button class="tab" data-tab="rules">转录规则</button>
          <button class="tab" data-tab="vocabulary">专有词汇</button>
        </div>
        <div class="editor-wrap">
          <textarea class="editor" id="prompt-editor" spellcheck="false" placeholder="Edit prompt here…"></textarea>
        </div>
        <div class="panel-footer">
          <button type="button" class="btn-text" id="reset-prompt">Reset to default</button>
          <span class="panel-msg" id="prompt-status"></span>
          <button type="button" class="btn-save-sm" id="save-prompt">Save</button>
        </div>
      </section>

      <!-- Settings panel -->
      <section class="panel settings-panel" id="settings-panel">
        <form id="settings-form">
          <div class="s-row">
            <label class="s-field">
              <span class="s-label">Provider</span>
              <div class="s-select">
                <select id="provider">
                  <option value="gemini">Gemini</option>
                  <option value="qwen">Qwen</option>
                </select>
              </div>
            </label>
            <label class="s-field">
              <span class="s-label">Model</span>
              <div class="s-select">
                <select id="model-name">
                  <optgroup label="Gemini" id="gemini-models">
                    <option value="gemini-3-flash-preview">gemini-3-flash</option>
                    <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite</option>
                  </optgroup>
                  <optgroup label="Qwen" id="qwen-models">
                    <option value="qwen3.5-omni-flash">qwen3.5-omni-flash</option>
                    <option value="qwen3.5-omni-plus">qwen3.5-omni-plus</option>
                  </optgroup>
                </select>
              </div>
            </label>
          </div>

          <label class="s-field" id="gemini-key-field">
            <span class="s-label">Gemini API Key</span>
            <div class="s-key-row">
              <input type="password" id="gemini-api-key" placeholder="Paste Gemini key" autocomplete="off" spellcheck="false" />
              <button type="button" class="s-eye toggle-key-btn" data-target="gemini-api-key" title="Show/Hide">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="s-hint" id="gemini-key-hint"></span>
          </label>

          <label class="s-field" id="qwen-key-field">
            <span class="s-label">Qwen API Key</span>
            <div class="s-key-row">
              <input type="password" id="qwen-api-key" placeholder="Paste Qwen key" autocomplete="off" spellcheck="false" />
              <button type="button" class="s-eye toggle-key-btn" data-target="qwen-api-key" title="Show/Hide">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="s-hint" id="qwen-key-hint"></span>
          </label>

          <div class="s-row">
            <label class="s-field">
              <span class="s-label">Hotkey</span>
              <input type="text" id="hotkey" placeholder="Click and press keys…" />
            </label>
            <label class="s-field">
              <span class="s-label">Device</span>
              <div class="s-select">
                <select id="audio-device"><option>Loading…</option></select>
              </div>
            </label>
          </div>

          <div class="s-footer">
            <button type="submit" class="s-save">Save</button>
            <span class="s-msg" id="save-status"></span>
            <span class="s-version" id="version"></span>
          </div>
        </form>
      </section>

    </main>
  </body>
</html>
