<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoType</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app">

      <!-- Top bar: brand + view nav -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-led" id="brand-led"></span>
          <span class="brand-name mono">NoType</span>
        </div>
        <nav class="nav" id="nav">
          <button type="button" class="nav-btn active" data-view="home">主页</button>
          <button type="button" class="nav-btn" data-view="history">历史</button>
          <button type="button" class="nav-btn" data-view="prompts">提示词</button>
          <button type="button" class="nav-btn" data-view="settings">设置</button>
        </nav>
      </header>

      <!-- ============ 主页 ============ -->
      <section class="view active" id="view-home">
        <div class="home-stage">
          <p class="status-label">
            <span id="status-text">待命</span><span class="rec-timer mono" id="rec-timer" hidden>00:00</span>
          </p>

          <button class="rec-btn" id="rec-btn" type="button" aria-label="开始 / 停止听写">
            <span class="rec-orbit"></span>
            <span class="waveform">
              <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
            </span>
          </button>

          <p class="shortcut-hint">
            按住 <kbd class="mono" id="hotkey-hint">Ctrl + .</kbd> 全局输入 · 点按按钮窗口听写
          </p>
          <button type="button" class="rec-cancel" id="rec-cancel" hidden>取消 <span class="mono">Esc</span></button>
        </div>

        <div class="result-card" id="result-card" hidden>
          <div class="result-head">
            <span class="result-label" id="result-label">听写结果</span>
            <span class="result-time mono" id="result-time"></span>
            <button type="button" class="icon-btn" id="copy-result" title="复制文本">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <p class="result-text" id="result-text"></p>
        </div>
      </section>

      <!-- ============ 历史 ============ -->
      <section class="view" id="view-history">
        <div class="view-head">
          <h2 class="view-title">转写历史</h2>
          <button type="button" class="btn-text" id="clear-history">清空</button>
        </div>
        <ul class="history-list" id="history-list"></ul>
        <div class="empty-state" id="history-empty" hidden>
          <p>还没有转写记录</p>
          <p class="empty-sub">按住快捷键说话，识别结果会保留在这里</p>
        </div>
      </section>

      <!-- ============ 提示词 ============ -->
      <section class="view view-prompts" id="view-prompts">
        <div class="panel-tabs">
          <button type="button" class="tab active" data-tab="agent">角色指令</button>
          <button type="button" class="tab" data-tab="rules">转录规则</button>
          <button type="button" class="tab" data-tab="vocabulary">专有词汇</button>
        </div>
        <div class="editor-wrap">
          <textarea class="editor" id="prompt-editor" spellcheck="false" placeholder="在此编辑提示词…"></textarea>
        </div>
        <div class="prompt-preview-wrap" id="prompt-preview-wrap" hidden>
          <div class="preview-label mono">Composed Prompt</div>
          <canvas id="prompt-preview-canvas"></canvas>
        </div>
        <div class="panel-footer">
          <button type="button" class="btn-text" id="reset-prompt">恢复默认</button>
          <button type="button" class="btn-text" id="toggle-preview">预览</button>
          <span class="panel-msg" id="prompt-status"></span>
          <button type="button" class="btn-primary btn-sm" id="save-prompt">保存</button>
        </div>
      </section>

      <!-- ============ 设置 ============ -->
      <section class="view view-settings" id="view-settings">
        <form id="settings-form">

          <div class="s-section">
            <h3 class="s-section-title">识别引擎</h3>

            <div class="s-field">
              <span class="s-label">服务商</span>
              <div class="seg" id="provider-seg">
                <button type="button" class="seg-btn" data-value="qwen">Qwen</button>
                <button type="button" class="seg-btn" data-value="gemini">Gemini</button>
                <button type="button" class="seg-btn" data-value="mimo">MiMo</button>
                <button type="button" class="seg-btn" data-value="doubao">Doubao</button>
              </div>
            </div>

            <label class="s-field">
              <span class="s-label">模型</span>
              <div class="s-select">
                <select id="model-name">
                  <optgroup label="Gemini" id="gemini-models">
                    <option value="gemini-3-flash-preview">gemini-3-flash</option>
                    <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite</option>
                  </optgroup>
                  <optgroup label="Qwen" id="qwen-models">
                    <option value="qwen3.5-omni-flash">qwen3.5-omni-flash</option>
                    <option value="qwen3.5-omni-plus">qwen3.5-omni-plus</option>
                  </optgroup>
                  <optgroup label="Xiaomi MiMo" id="mimo-models">
                    <option value="mimo-v2.5-asr">mimo-v2.5-asr</option>
                    <option value="mimo-v2.5">mimo-v2.5</option>
                    <option value="mimo-v2-omni">mimo-v2-omni</option>
                    <option value="mimo-v2.5-pro">mimo-v2.5-pro</option>
                  </optgroup>
                  <optgroup label="Doubao ASR" id="doubao-models">
                    <option value="doubao-asr">doubao-asr (ASR2API)</option>
                    <option value="doubao-asr-official-flash">doubao-asr-official-flash</option>
                    <option value="doubao-asr-official-standard">doubao-asr-official-standard</option>
                  </optgroup>
                </select>
              </div>
            </label>

            <label class="s-field" id="gemini-key-field">
              <span class="s-label">Gemini API Key</span>
              <div class="s-key-row">
                <input type="password" id="gemini-api-key" placeholder="粘贴 Gemini Key" autocomplete="off" spellcheck="false" />
                <button type="button" class="s-eye toggle-key-btn" data-target="gemini-api-key" title="显示 / 隐藏">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="s-hint" id="gemini-key-hint"></span>
            </label>

            <label class="s-field" id="qwen-key-field">
              <span class="s-label">Qwen API Key</span>
              <div class="s-key-row">
                <input type="password" id="qwen-api-key" placeholder="粘贴 Qwen Key" autocomplete="off" spellcheck="false" />
                <button type="button" class="s-eye toggle-key-btn" data-target="qwen-api-key" title="显示 / 隐藏">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="s-hint" id="qwen-key-hint"></span>
            </label>

            <div id="mimo-fields" hidden>
              <label class="s-field">
                <span class="s-label">MiMo API Key</span>
                <div class="s-key-row">
                  <input type="password" id="mimo-api-key" placeholder="粘贴 MiMo Key" autocomplete="off" spellcheck="false" />
                  <button type="button" class="s-eye toggle-key-btn" data-target="mimo-api-key" title="显示 / 隐藏">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <span class="s-hint" id="mimo-key-hint"></span>
              </label>

              <label class="s-field">
                <span class="s-label">MiMo Base URL</span>
                <input type="text" id="mimo-base-url" placeholder="https://api.xiaomimimo.com/v1" autocomplete="off" spellcheck="false" />
              </label>
            </div>

            <div id="doubao-fields" hidden>
              <label class="s-field">
                <span class="s-label">ASR2API 网关地址</span>
                <input type="text" id="doubao-base-url" placeholder="http://127.0.0.1:8000" autocomplete="off" spellcheck="false" />
              </label>

              <label class="s-field">
                <span class="s-label">网关 Key（可选）</span>
                <div class="s-key-row">
                  <input type="password" id="doubao-api-key" placeholder="粘贴网关 Key（可选）" autocomplete="off" spellcheck="false" />
                  <button type="button" class="s-eye toggle-key-btn" data-target="doubao-api-key" title="显示 / 隐藏">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <span class="s-hint" id="doubao-key-hint"></span>
              </label>

              <div id="doubao-official-key-fields" hidden>
                <label class="s-field">
                  <span class="s-label">官方 App Key</span>
                  <div class="s-key-row">
                    <input type="password" id="doubao-official-app-key" placeholder="粘贴官方 App Key" autocomplete="off" spellcheck="false" />
                    <button type="button" class="s-eye toggle-key-btn" data-target="doubao-official-app-key" title="显示 / 隐藏">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                  </div>
                  <span class="s-hint" id="doubao-official-app-key-hint"></span>
                </label>

                <label class="s-field">
                  <span class="s-label">官方 Access Key</span>
                  <div class="s-key-row">
                    <input type="password" id="doubao-official-access-key" placeholder="粘贴官方 Access Key" autocomplete="off" spellcheck="false" />
                    <button type="button" class="s-eye toggle-key-btn" data-target="doubao-official-access-key" title="显示 / 隐藏">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                  </div>
                  <span class="s-hint" id="doubao-official-access-key-hint"></span>
                </label>
              </div>

              <div class="s-row">
                <div class="s-field s-field-switch">
                  <span class="s-label">LLM 实时后处理</span>
                  <label class="switch">
                    <input type="checkbox" id="doubao-postprocess-enabled" />
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                  </label>
                </div>
                <label class="s-field">
                  <span class="s-label">后处理偏好</span>
                  <div class="s-select">
                    <select id="doubao-postprocess-provider">
                      <option value="auto">自动（Qwen → Gemini）</option>
                      <option value="qwen">优先 Qwen</option>
                      <option value="gemini">优先 Gemini</option>
                    </select>
                  </div>
                </label>
              </div>

              <div class="s-row">
                <div class="s-field s-field-switch">
                  <span class="s-label">WS 实时预览</span>
                  <label class="switch">
                    <input type="checkbox" id="doubao-realtime-ws-enabled" />
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                  </label>
                </div>
                <label class="s-field">
                  <span class="s-label">IME 凭证路径</span>
                  <input type="text" id="doubao-ime-credential-path" placeholder="~/.config/doubaoime-asr/credentials.json" autocomplete="off" spellcheck="false" />
                </label>
              </div>

              <button type="button" class="btn-outline" id="doubao-setup-btn">
                一键安装依赖、初始化凭证并启动网关
              </button>
              <p class="s-hint" id="doubao-setup-status"></p>
              <p class="s-hint" id="doubao-postprocess-hint"></p>
            </div>
          </div>

          <div class="s-section">
            <h3 class="s-section-title">输入</h3>

            <div class="s-row">
              <label class="s-field">
                <span class="s-label">快捷键</span>
                <input type="text" id="hotkey" class="mono" placeholder="点击后按下组合键…" />
              </label>
              <label class="s-field">
                <span class="s-label">麦克风</span>
                <div class="s-select">
                  <select id="audio-device"><option value="">加载中…</option></select>
                </div>
              </label>
            </div>

            <div class="s-row">
              <label class="s-field">
                <span class="s-label">输入方式</span>
                <div class="s-select">
                  <select id="input-mode">
                    <option value="keyboard">模拟键盘输入</option>
                    <option value="clipboard">剪贴板粘贴（长文本更快）</option>
                  </select>
                </div>
              </label>
              <div class="s-field s-field-switch">
                <span class="s-label">完成后复制到剪贴板</span>
                <label class="switch">
                  <input type="checkbox" id="auto-copy" />
                  <span class="switch-track"><span class="switch-thumb"></span></span>
                </label>
              </div>
            </div>
          </div>

          <div class="s-section">
            <h3 class="s-section-title">通用</h3>

            <div class="s-row">
              <div class="s-field s-field-switch">
                <span class="s-label">开机自启动</span>
                <label class="switch">
                  <input type="checkbox" id="autostart" />
                  <span class="switch-track"><span class="switch-thumb"></span></span>
                </label>
              </div>
              <div class="s-field">
                <span class="s-label">配置文件</span>
                <button type="button" class="btn-outline btn-sm" id="open-config-dir">打开配置文件夹</button>
              </div>
            </div>
          </div>

          <div class="s-footer">
            <button type="submit" class="btn-primary">保存设置</button>
            <span class="s-msg" id="save-status"></span>
            <span class="s-version mono" id="version"></span>
          </div>
        </form>
      </section>

    </main>
  </body>
</html>
